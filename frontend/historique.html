<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historique — Supervision CNS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <style>
        .hist-header {
            background: #1a3a5c;
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hist-header h1 { font-size: 17px; font-weight: 600; }

        .filtres {
            background: white;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            border-bottom: 1px solid #e5e7eb;
        }
        .filtre-groupe { display: flex; flex-direction: column; gap: 4px; }
        .filtre-groupe label { font-size: 12px; color: #6b7280; font-weight: 500; }
        .filtre-groupe select,
        .filtre-groupe input {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            background: #f9fafb;
        }
        .filtre-groupe select:focus,
        .filtre-groupe input:focus { border-color: #1a3a5c; background: white; }

        .btn-filtrer {
            padding: 8px 18px;
            background: #1a3a5c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            align-self: flex-end;
        }
        .btn-filtrer:hover { background: #243f6b; }

        .export-bar {
            padding: 12px 24px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .export-bar span { font-size: 12px; color: #6b7280; margin-right: 4px; }

        .btn-export {
            padding: 7px 16px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid;
            transition: opacity 0.2s;
        }
        .btn-export:hover { opacity: 0.8; }
        .btn-csv { background: #dcfce7; color: #166534; border-color: #86efac; }
        .btn-pdf { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }

        .stats-rapides {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 0 24px 16px;
        }
        .stat-card {
            background: white;
            border-radius: 10px;
            padding: 12px 16px;
            border: 1px solid #e5e7eb;
            text-align: center;
        }
        .stat-card .s-label { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
        .stat-card .s-value { font-size: 22px; font-weight: 700; }

        .tableau-container {
            margin: 0 24px 24px;
            background: white;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }
        .tableau-alarmes { width: 100%; border-collapse: collapse; font-size: 13px; }
        .tableau-alarmes th {
            text-align: left;
            padding: 10px 14px;
            background: #f9fafb;
            color: #6b7280;
            font-weight: 600;
            border-bottom: 1px solid #e5e7eb;
            font-size: 11px;
            text-transform: uppercase;
        }
        .tableau-alarmes td {
            padding: 10px 14px;
            border-bottom: 1px solid #f3f4f6;
            vertical-align: middle;
        }
        .tableau-alarmes tr:last-child td { border-bottom: none; }
        .tableau-alarmes tr:hover td { background: #f9fafb; }

        .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 99px; display: inline-block; }
        .badge-alarm    { background: #fee2e2; color: #991b1b; }
        .badge-fault    { background: #fef3c7; color: #92400e; }
        .badge-acquitte { background: #dcfce7; color: #166534; }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px;
        }
        .btn-page {
            padding: 6px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            background: white;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-page.actif { background: #1a3a5c; color: white; border-color: #1a3a5c; }
        .btn-page:hover:not(.actif) { background: #f3f4f6; }
        .vide { text-align: center; color: #9ca3af; padding: 32px; font-size: 13px; }

        .btn-retour {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
        }
        .btn-retour:hover { background: rgba(255,255,255,0.25); }
    </style>
</head>
<body>

    <div class="hist-header">
        <div>
            <h1>📋 Historique des alarmes — Supervision CNS</h1>
            <p style="font-size:12px;opacity:0.7;margin-top:4px;">Toutes les alarmes enregistrées</p>
        </div>
        <div style="display:flex;gap:10px;">
            <button class="btn-retour" onclick="window.location.href='index.html'">← Dashboard</button>
            <button class="btn-retour" onclick="window.location.href='kpi.html'">📊 KPIs</button>
        </div>
    </div>

    <div class="filtres">
        <div class="filtre-groupe">
            <label>Système</label>
            <select id="filtre-systeme">
                <option value="">Tous</option>
                <option value="VOR">VOR</option>
                <option value="Localiser">Localiser</option>
                <option value="DME VOR">DME VOR</option>
                <option value="DME Glide">DME Glide</option>
                <option value="VHF COM 1">VHF COM 1</option>
                <option value="Glide">Glide</option>
            </select>
        </div>
        <div class="filtre-groupe">
            <label>État</label>
            <select id="filtre-etat">
                <option value="">Tous</option>
                <option value="false">Non acquittées</option>
                <option value="true">Acquittées</option>
            </select>
        </div>
        <div class="filtre-groupe">
            <label>Date début</label>
            <input type="date" id="filtre-debut"/>
        </div>
        <div class="filtre-groupe">
            <label>Date fin</label>
            <input type="date" id="filtre-fin"/>
        </div>
        <button class="btn-filtrer" onclick="appliquerFiltres()">🔍 Filtrer</button>
        <button class="btn-filtrer" style="background:#6b7280;" onclick="reinitialiserFiltres()">↺ Reset</button>
    </div>

    <div class="export-bar">
        <span>Exporter :</span>
        <button class="btn-export btn-csv" onclick="exporterCSV()">⬇ CSV</button>
        <button class="btn-export btn-pdf" onclick="exporterPDF()">⬇ PDF</button>
        <span id="nb-resultats" style="margin-left:auto;font-size:12px;color:#6b7280;"></span>
    </div>

    <div class="stats-rapides">
        <div class="stat-card">
            <div class="s-label">Total alarmes</div>
            <div class="s-value" id="stat-total" style="color:#1a3a5c">—</div>
        </div>
        <div class="stat-card">
            <div class="s-label">Non acquittées</div>
            <div class="s-value" id="stat-actives" style="color:#dc2626">—</div>
        </div>
        <div class="stat-card">
            <div class="s-label">Acquittées</div>
            <div class="s-value" id="stat-acquittees" style="color:#16a34a">—</div>
        </div>
        <div class="stat-card">
            <div class="s-label">MTTR moyen</div>
            <div class="s-value" id="stat-mttr" style="color:#d97706">—</div>
        </div>
    </div>

    <div class="tableau-container">
        <table class="tableau-alarmes">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Système</th>
                    <th>Type</th>
                    <th>Début</th>
                    <th>Fin</th>
                    <th>Durée</th>
                    <th>État</th>
                    <th>Opérateur</th>
                </tr>
            </thead>
            <tbody id="corps-historique">
                <tr><td colspan="8" class="vide">Chargement...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>

    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'login.html';

    const API          = 'http://127.0.0.1:8000';
    const PAR_PAGE     = 20;
    let   pageActuelle = 1;
    let   toutesAlarmes   = [];
    let   alarmesFiltrees = [];

    // ════════════════════════════════
    // ✅ PARSE DATE — corrige "invalid date"
    // PostgreSQL retourne "2024-01-15 14:32:05.123456"
    // JavaScript attend  "2024-01-15T14:32:05"
    // ════════════════════════════════
    function parseDate(str) {
        if (!str || str === 'None' || str === 'null') return null;
        // Remplacer l'espace par T pour ISO 8601
        const iso = str.toString().replace(' ', 'T').split('.')[0];
        const d   = new Date(iso);
        return isNaN(d.getTime()) ? null : d;
    }

    // ════════════════════════════════
    // ✅ FORMAT DATE — affichage lisible
    // ════════════════════════════════
    function formaterDate(str) {
        const d = parseDate(str);
        if (!d) return '<span style="color:#9ca3af">—</span>';
        return d.toLocaleString('fr-FR', {
            day:    '2-digit',
            month:  '2-digit',
            year:   'numeric',
            hour:   '2-digit',
            minute: '2-digit'
        });
    }

    // ════════════════════════════════
    // ✅ DURÉE — corrige NaNh NaNmin
    // ════════════════════════════════
    function calculerDuree(debut, fin) {
        const d1 = parseDate(debut);
        const d2 = parseDate(fin);
        if (!d1 || !d2) return '<span style="color:#9ca3af">En cours</span>';
        const diff = Math.round((d2 - d1) / 1000);
        if (diff < 0)    return '<span style="color:#9ca3af">—</span>';
        if (diff < 60)   return diff + 's';
        if (diff < 3600) return Math.floor(diff / 60) + 'min ' + (diff % 60) + 's';
        return Math.floor(diff / 3600) + 'h ' + Math.floor((diff % 3600) / 60) + 'min';
    }

    // Durée en secondes (pour MTTR)
    function dureeEnSecondes(debut, fin) {
        const d1 = parseDate(debut);
        const d2 = parseDate(fin);
        if (!d1 || !d2) return null;
        const diff = Math.round((d2 - d1) / 1000);
        return diff > 0 ? diff : null;
    }

    // ════════════════════════════════
    // CHARGEMENT
    // ════════════════════════════════
    async function chargerHistorique() {
        try {
            const response = await fetch(API + '/api/historique', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!response.ok) throw new Error('Erreur ' + response.status);
            toutesAlarmes   = await response.json();
            alarmesFiltrees = [...toutesAlarmes];
            afficher();
            mettreAJourStats();
        } catch(e) {
            document.getElementById('corps-historique').innerHTML =
                `<tr><td colspan="8" class="vide">❌ Erreur : ${e.message}</td></tr>`;
        }
    }

    // ════════════════════════════════
    // AFFICHAGE
    // ════════════════════════════════
    function afficher() {
        const debut = (pageActuelle - 1) * PAR_PAGE;
        const page  = alarmesFiltrees.slice(debut, debut + PAR_PAGE);
        const tbody = document.getElementById('corps-historique');

        document.getElementById('nb-resultats').textContent =
            `${alarmesFiltrees.length} résultat(s)`;

        if (page.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="vide">Aucune alarme trouvée</td></tr>';
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        tbody.innerHTML = page.map(a => {
            const badgeEtat  = a.acquitte
                ? '<span class="badge badge-acquitte">Acquittée</span>'
                : '<span class="badge badge-alarm">Active</span>';
            const typeClass  = (a.type_alarme || '').includes('FAULT')
                ? 'badge-fault' : 'badge-alarm';

            // ✅ Opérateur : afficher "—" si vide
            const operateur  = (a.operateur_nom && a.operateur_nom !== '—')
                ? a.operateur_nom : '<span style="color:#9ca3af">—</span>';

            return `
                <tr>
                    <td style="color:#9ca3af;font-size:11px;">${a.id}</td>
                    <td style="font-weight:600;">${a.systeme_nom || '—'}</td>
                    <td><span class="badge ${typeClass}">${a.type_alarme || '—'}</span></td>
                    <td>${formaterDate(a.debut)}</td>
                    <td>${formaterDate(a.fin)}</td>
                    <td>${calculerDuree(a.debut, a.fin)}</td>
                    <td>${badgeEtat}</td>
                    <td>${operateur}</td>
                </tr>`;
        }).join('');

        afficherPagination();
    }

    function afficherPagination() {
        const totalPages = Math.ceil(alarmesFiltrees.length / PAR_PAGE);
        const pg = document.getElementById('pagination');
        if (totalPages <= 1) { pg.innerHTML = ''; return; }

        let html = `<button class="btn-page" onclick="changerPage(${pageActuelle - 1})"
                    ${pageActuelle === 1 ? 'disabled' : ''}>←</button>`;
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || Math.abs(i - pageActuelle) <= 2) {
                html += `<button class="btn-page ${i === pageActuelle ? 'actif' : ''}"
                         onclick="changerPage(${i})">${i}</button>`;
            } else if (Math.abs(i - pageActuelle) === 3) {
                html += `<span style="color:#9ca3af;padding:0 4px;">...</span>`;
            }
        }
        html += `<button class="btn-page" onclick="changerPage(${pageActuelle + 1})"
                 ${pageActuelle === totalPages ? 'disabled' : ''}>→</button>`;
        pg.innerHTML = html;
    }

    function changerPage(n) {
        const total = Math.ceil(alarmesFiltrees.length / PAR_PAGE);
        if (n < 1 || n > total) return;
        pageActuelle = n;
        afficher();
        window.scrollTo(0, 0);
    }

    // ════════════════════════════════
    // FILTRES
    // ════════════════════════════════
    function appliquerFiltres() {
    const systeme = document.getElementById('filtre-systeme').value;
    const etat    = document.getElementById('filtre-etat').value;
    const debut   = document.getElementById('filtre-debut').value;
    const fin     = document.getElementById('filtre-fin').value;

    alarmesFiltrees = toutesAlarmes.filter(a => {
        // Filtre système
        if (systeme && a.systeme_nom !== systeme) return false;

        // Filtre état
        if (etat !== '' && String(a.acquitte) !== etat) return false;

        // ✅ Filtre date — comparer uniquement la partie date (YYYY-MM-DD)
        if (debut || fin) {
            const d = parseDate(a.debut);
            if (!d) return false;

            // Extraire juste la date sans heure pour comparer
            const dateAlarme = d.toISOString().slice(0, 10); // "2024-01-15"

            if (debut && dateAlarme < debut) return false;
            if (fin   && dateAlarme > fin)   return false;
        }

        return true;
    });

    pageActuelle = 1;
    afficher();
    mettreAJourStats();
}

    function reinitialiserFiltres() {
        document.getElementById('filtre-systeme').value = '';
        document.getElementById('filtre-etat').value    = '';
        document.getElementById('filtre-debut').value   = '';
        document.getElementById('filtre-fin').value     = '';
        alarmesFiltrees = [...toutesAlarmes];
        pageActuelle    = 1;
        afficher();
        mettreAJourStats();
    }

    // ════════════════════════════════
    // ✅ STATS — corrige NaN MTTR
    // ════════════════════════════════
    function mettreAJourStats() {
        const total      = alarmesFiltrees.length;
        const actives    = alarmesFiltrees.filter(a => !a.acquitte).length;
        const acquittees = alarmesFiltrees.filter(a =>  a.acquitte).length;

        // ✅ Calculer MTTR seulement sur les alarmes avec fin valide
        const durees = alarmesFiltrees
            .map(a => dureeEnSecondes(a.debut, a.fin))
            .filter(d => d !== null && d > 0);

        const mttr = durees.length > 0
            ? Math.round(durees.reduce((s, d) => s + d, 0) / durees.length)
            : 0;

        // ✅ Formater MTTR en min/sec si > 60s
        let mttrAffiche;
        if (mttr === 0)       mttrAffiche = '—';
        else if (mttr < 60)   mttrAffiche = mttr + 's';
        else                  mttrAffiche = Math.floor(mttr/60) + 'min';

        document.getElementById('stat-total').textContent      = total;
        document.getElementById('stat-actives').textContent    = actives;
        document.getElementById('stat-acquittees').textContent = acquittees;
        document.getElementById('stat-mttr').textContent       = mttrAffiche;
    }

    // ════════════════════════════════
    // EXPORT CSV
    // ════════════════════════════════
    function exporterCSV() {
        const entetes = ['ID','Système','Type','Début','Fin','Durée(s)','Acquittée','Opérateur'];
        const lignes  = alarmesFiltrees.map(a => {
            const duree = dureeEnSecondes(a.debut, a.fin);
            return [
                a.id,
                a.systeme_nom  || '',
                a.type_alarme  || '',
                a.debut        || '',
                a.fin          || '',
                duree !== null ? duree : '',
                a.acquitte ? 'Oui' : 'Non',
                a.operateur_nom || ''
            ];
        });

        const contenu = [entetes, ...lignes]
            .map(l => l.map(c => `"${c}"`).join(';'))
            .join('\n');

        const blob = new Blob(['\uFEFF' + contenu], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const lien = document.createElement('a');
        lien.href     = url;
        lien.download = `historique_alarmes_${new Date().toISOString().slice(0,10)}.csv`;
        lien.click();
        URL.revokeObjectURL(url);
    }

    // ════════════════════════════════
    // EXPORT PDF
    // ════════════════════════════════
    function exporterPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation: 'landscape' });

        doc.setFontSize(14);
        doc.setTextColor(26, 58, 92);
        doc.text('Supervision CNS — Historique des alarmes', 14, 16);
        doc.setFontSize(9);
        doc.setTextColor(107, 114, 128);
        doc.text(
            `Généré le ${new Date().toLocaleString('fr-FR')} — ${alarmesFiltrees.length} alarme(s)`,
            14, 23
        );

        doc.autoTable({
            startY: 28,
            head: [['#','Système','Type','Début','Fin','Durée','État','Opérateur']],
            body: alarmesFiltrees.map(a => {
                const d = parseDate(a.debut);
                const f = parseDate(a.fin);
                return [
                    a.id,
                    a.systeme_nom  || '—',
                    a.type_alarme  || '—',
                    d ? d.toLocaleString('fr-FR') : '—',
                    f ? f.toLocaleString('fr-FR') : '—',
                    calculerDuree(a.debut, a.fin).replace(/<[^>]*>/g, ''),
                    a.acquitte ? 'Acquittée' : 'Active',
                    a.operateur_nom || '—'
                ];
            }),
            styles:     { fontSize: 8, cellPadding: 3 },
            headStyles: { fillColor: [26, 58, 92], textColor: 255, fontStyle: 'bold' },
            alternateRowStyles: { fillColor: [249, 250, 251] },
            didParseCell: function(data) {
                if (data.column.index === 6 && data.section === 'body') {
                    data.cell.styles.textColor = data.cell.raw === 'Acquittée'
                        ? [22, 163, 74] : [220, 38, 38];
                }
            }
        });

        doc.save(`historique_alarmes_${new Date().toISOString().slice(0,10)}.pdf`);
    }

    chargerHistorique();
    </script>
</body>
</html>
